<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            width: 45%;
            padding: 10px;
            margin: 5px 2px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:nth-child(1) { background: #4CAF50; color: white; }
        button:nth-child(2) { background: #f39c12; color: white; }
        button:nth-child(3) { background: #3498db; color: white; }
        button:nth-child(4) { background: #e74c3c; color: white; }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #222;
            min-height: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Calculator</h2>

    <input id="num1" placeholder="Num1">
    <input id="num2" placeholder="Num2">

    <br>

    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('subtract')">Sub</button>
    <button onclick="calculate('multiply')">Mul</button>
    <button onclick="calculate('divide')">Div</button>

    <div class="result" id="result"></div>

</div>

<script>
    function calculate(operation) {
        const num1 = document.getElementById("num1").value;
        const num2 = document.getElementById("num2").value;

        fetch("http://localhost:8080/calculate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                num1: parseFloat(num1),
                num2: parseFloat(num2),
                operation: operation
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText = "Result: " + data.result;
            })
            .catch(err => {
                document.getElementById("result").innerText = "Error calling API";
                console.error(err);
            });
    }
</script>

</body>
</html>
